apiVersion: v1
kind: Deployment
metadata:
  name: pk-backend-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: pk-backend
  template:
    metadata:
      labels:
        app: pk-backend
    spec:
      imagePullSecrets:
        - name: ghcr-login-secret
      containers:
        - name: pk-backend
          image: ghcr.io/milanmarko/pk-backend
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: pk-backend-service
spec:
  selector:
    app: pk-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: pk-backend-certificate
spec:
  secretName: pk-backend-certificate
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - pk-backend.jcloud.jedlik.cloud
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pk-backend-ingress
spec:
  rules:
    - host: pk-backend.jcloud.jedlik.cloud
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pk-backend-service
                port:
                  number: 80
